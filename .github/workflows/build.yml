name: Build

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

jobs:
  build-and-test:
    name: Build + test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project Jarvis.xcodeproj \
            -scheme Jarvis \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run tests
        run: |
          xcodebuild \
            -project Jarvis.xcodeproj \
            -scheme Jarvis \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | tail -40
